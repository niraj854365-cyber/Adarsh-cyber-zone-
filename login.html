<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>User Login - Adarsh Cyber Zone</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="top-header">
    <img src="logo.png" alt="Adarsh Cyber Zone Logo">
    <div>
        <h1 class="brand-title">आदर्श साइबर ज़ोन & ग्राहक सेवा केन्द्र</h1>
        <p class="brand-subtitle">CSC, RTPS, Digital Services और Online Form Support</p>
    </div>
</header>

<nav>
    <a href="register.html">Register</a>
    <a href="login.html">Login</a>
    <a href="knowregno.html">Know Reg No</a>
    <a href="adminlogin.html">Admin Login</a>
    <a href="payment.html"> Fee Payment</a>
</nav>

<main class="container">
    <section class="card auth-card">
        <h2>User Login</h2>

        <label for="loginRegNo">Registration No. (ACZ0000001)</label>
        <input type="text" id="loginRegNo" maxlength="10" placeholder="ACZ0000001">

        <label for="loginDob">DOB (DD-MM-YYYY)</label>
        <input type="text" id="loginDob" placeholder="DD-MM-YYYY" maxlength="10">

        <div class="button-row">
            <button type="button" class="btn btn-green" onclick="userLogin(event)">Login</button>
            <a class="btn btn-light" href="rtpscounter.html">Back to RTPS Counter</a>
        </div>
        <div id="loginMsg"></div>

    </section>
</main>

<div class="modal-bg" id="confirmModal">
    <div class="modal-box">
        <h3>Confirmation</h3>
        <p id="confirmText">Do you want to continue?</p>
        <div class="modal-actions">
            <button class="modal-yes" onclick="confirmYes()">Yes</button>
            <button class="modal-no" onclick="confirmNo()">No</button>
        </div>
    </div>
</div>

<footer class="site-footer">&copy; 2026 Adarsh Cyber Zone</footer>
<script src="script.js"></script>
<script>
async function userLogin(event) {
    const regNo = $("loginRegNo").value.trim().toUpperCase();
    const dob = $("loginDob").value.trim();

    if (!regNo || !dob) {
        showMessage("loginMsg", "Registration Number aur DOB bharen.", true);
        return;
    }

    if (!/^ACZ\d{7}$/.test(regNo)) {
        showMessage("loginMsg", "Registration Number format sahi bharen (ACZ0000001).", true);
        return;
    }

    if (!validateDob(dob)) {
        showMessage("loginMsg", "DOB DD-MM-YYYY format me bharen.", true);
        return;
    }

    if (!window.confirm("Do you want to login?")) return;

    const restore = setButtonLoading(event.target, "Processing...");

    try {
        const result = await sendRequest({ action: "getUser", regNo, RegNo: regNo, dob, DOB: dob });

        if (result.success && result.data) {
            localStorage.setItem("loggedUser", JSON.stringify(result.data));
            window.location.href = "userdashboard.html";
        } else {
            restore();
            showMessage("loginMsg", result.message || "Galat Registration Number ya DOB.", true);
        }
    } catch (error) {
        restore();
        showMessage("loginMsg", "Server error: " + error.message, true);
    }
}

window.addEventListener("DOMContentLoaded", () => {
    regNoFormat("loginRegNo");
    autoDOB("loginDob");
});
</script>
</body>
</html>
